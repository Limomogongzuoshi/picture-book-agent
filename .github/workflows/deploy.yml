name: Deploy to IGA Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install IGA CLI
        run: npm install -g @iga-pages/cli

      - name: Deploy to IGA Pages
        run: iga pages deploy --name picture-book-agent
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_BASE_URL: ${{ secrets.ARK_BASE_URL }}
          SEEDREAM_MODEL: ${{ secrets.SEEDREAM_MODEL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
